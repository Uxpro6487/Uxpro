name: Deploy Static Content to Pages

on:
  push:
    branches: ["main"] # ඔයාගේ main branch එකේ නම (main හෝ master)

# GitHub Pages වලට deploy කරන්න අවසර ලබා දීම
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps: deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.' # ඔයාගේ index.html තියෙන තැන (මෙතන තියෙන්නේ root folder එකේ)

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
